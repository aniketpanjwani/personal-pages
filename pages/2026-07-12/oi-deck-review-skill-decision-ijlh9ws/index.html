<script>
(()=>{'use strict';const el=id=>document.getElementById(id);let report;let draft={reviewer:'',decisions:{}};const actions=['','promote','revise-and-promote','reject','needs-context','defer'];
const say=(msg,bad=false)=>{el('status').textContent=msg;el('status').className='status'+(bad?' error':'')};
const canonical=v=>{if(Array.isArray(v))return v.map(canonical);if(v&&typeof v==='object')return Object.fromEntries(Object.keys(v).sort().map(k=>[k,canonical(v[k])]));return v};
const sha=async s=>Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)))).map(b=>b.toString(16).padStart(2,'0')).join('');
try{report=JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(el('report-data').textContent.trim()),c=>c.charCodeAt(0))))}catch(e){say('This report data is malformed. No decisions were changed.',true);el('export').disabled=true;return}
const key='oi-deck-eval:'+report.report_hash;try{const saved=localStorage.getItem(key);if(saved)draft=JSON.parse(saved)}catch(e){say('Draft storage is unavailable. You can still export this session.',false)}
const save=()=>{draft.reviewer=el('reviewer').value;try{localStorage.setItem(key,JSON.stringify(draft))}catch(e){say('Draft storage is unavailable. Export before closing this page.',false)}update()};
el('reviewer').value=draft.reviewer||'';el('release').textContent=report.release_passed?'Passed':'Review';el('tier1').textContent=report.tier1_failed_count||0;el('count').textContent=report.findings.length;
const render=()=>{const root=el('findings');root.replaceChildren();if(!report.findings.length){const x=document.createElement('div');x.className='empty';x.textContent='No qualitative findings are available for adjudication.';root.append(x);say('Nothing to adjudicate.');return}report.findings.forEach(f=>{const a=document.createElement('article');a.className='finding';a.dataset.severity=f.severity;a.dataset.id=f.finding_id;const decision=draft.decisions[f.finding_id]||{};a.innerHTML=`<h2></h2><div class="meta"><span class="pill severity"></span><span class="pill dimension"></span><span class="pill confidence"></span></div><div class="compare"><section><h3>Expected</h3><p class="expected"></p></section><section><h3>Observed</h3><p class="observed"></p></section></div><div class="evidence"><h3>Evidence</h3><code></code></div><div class="actions"><div class="field"><label>Decision</label><select class="action"></select></div><div class="field"><label>Reviewer note</label><textarea class="notes" rows="2"></textarea></div><div class="field wide revision" hidden><label>Revised expected behavior</label><textarea class="revised" rows="2"></textarea></div></div>`;const heading=(f.title||f.key).replaceAll('-',' ');a.querySelector('h2').textContent=heading.charAt(0).toUpperCase()+heading.slice(1);a.querySelector('.severity').textContent=f.severity;a.querySelector('.dimension').textContent=f.dimension;a.querySelector('.confidence').textContent=Math.round(f.confidence*100)+'% confidence';a.querySelector('.expected').textContent=f.expected_behavior;a.querySelector('.observed').textContent=f.observed_behavior;a.querySelector('code').textContent=f.evidence.map(x=>x.path+(x.pointer?' '+x.pointer:'')).join(' | ');const sel=a.querySelector('.action');actions.forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x||'Choose...';sel.append(o)});sel.value=decision.action||'';a.querySelector('.notes').value=decision.notes||'';a.querySelector('.revised').value=decision.revised_expected_behavior||'';const sync=()=>{draft.decisions[f.finding_id]={action:sel.value,notes:a.querySelector('.notes').value,revised_expected_behavior:a.querySelector('.revised').value};a.querySelector('.revision').hidden=sel.value!=='revise-and-promote';save()};sel.addEventListener('change',sync);a.querySelector('.notes').addEventListener('input',sync);a.querySelector('.revised').addEventListener('input',sync);a.querySelector('.revision').hidden=sel.value!=='revise-and-promote';root.append(a)});say('Review each finding, then export a portable packet.')};
const update=()=>{const decided=report.findings.filter(f=>draft.decisions[f.finding_id]?.action).length;el('progress').textContent=decided+' / '+report.findings.length;document.querySelectorAll('.finding').forEach(a=>{const d=draft.decisions[a.dataset.id]?.action||'';const sev=el('severity-filter').value;const state=el('state-filter').value;a.hidden=(sev!=='all'&&a.dataset.severity!==sev)||(state==='decided'&&!d)||(state==='undecided'&&d)})};
render();update();el('reviewer').addEventListener('input',save);el('severity-filter').addEventListener('change',update);el('state-filter').addEventListener('change',update);el('batch').addEventListener('click',()=>{report.findings.filter(f=>f.severity==='low'&&f.status==='provisional').forEach(f=>draft.decisions[f.finding_id]={action:'promote',notes:'Batch-promoted low-risk evaluator suggestion.',revised_expected_behavior:''});render();save()});
el('export').addEventListener('click',async()=>{const identity=el('reviewer').value.trim();if(!identity){say('Enter a reviewer identity before exporting.',true);el('reviewer').focus();return}const decisions=report.findings.map(f=>({finding_id:f.finding_id,case_id:f.case_id,...(draft.decisions[f.finding_id]||{})})).filter(d=>d.action);const invalid=decisions.find(d=>d.action==='revise-and-promote'&&!d.revised_expected_behavior?.trim());if(invalid){say('Every revise-and-promote decision needs revised expected behavior.',true);return}const p={schema_version:1,report_hash:report.report_hash,suite_id:report.suite_id,profile:report.profile,privacy:report.privacy,reviewer:{identity,self_asserted:true},source_revisions:report.source_revisions||[],decisions};p.packet_id='packet-'+(await sha(JSON.stringify(canonical(p)))).slice(0,16);try{const blob=new Blob([JSON.stringify(p,null,2)+'\n'],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=p.packet_id+'.json';document.body.append(a);a.click();a.remove();URL.revokeObjectURL(url);say('Decision packet exported: '+p.packet_id)}catch(e){say('The browser could not download the packet. Your draft remains here.',true)}});
})();
</script></body></html>
